name: cub3D CI Pipeline

on:
  push:
  pull_request:

jobs:

  cub3D_tests:
    name: ${{ matrix.label }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - target: test_norm
            label: "cub3D: Check Norm"

          - target: test_parser
            label: "cub3D: Test Parser"

    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libreadline-dev libncurses-dev python3 python3-pip
          pip3 install norminette

      - name: Run ${{ matrix.label }}
        run: make ${{ matrix.target }}